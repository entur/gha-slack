name: Entur/Slack/React

on:
  workflow_call:
    inputs:
      channel_id:
        description: "Slack channel ID where the message was posted"
        type: string
        required: true
      message_ts:
        description: "Slack message timestamp (unique message ID) to react to"
        type: string
        required: true
      emoji:
        description: "Emoji name to react with (without colons)"
        type: string
        required: true
      timeout_minutes:
        description: "Job timeout in minutes"
        type: number
        default: 5
jobs:
  slack-react:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/react
        with:
          channel_id: ${{ inputs.channel_id }}
          message_ts: ${{ inputs.message_ts }}
          emoji: ${{ inputs.emoji }}
          token: ${{ secrets.SLACK_BOT_TOKEN }}
