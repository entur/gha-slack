name: Entur/Slack/React

on:
  workflow_call:
    inputs:
      channel_id:
        description: "Slack channel id where the message was posted"
        type: string
        required: true
      message_ts:
        description: "Slack message timestamp (unique message ID) to react to"
        type: string
        required: true
      emoji:
        description: |
          Emoji name to react with (without colons). Common examples:
            white_check_mark  ✅  success / done
            x                 ❌  failure
            rocket            🚀  deployment / release
            eyes              👀  reviewing / taking a look
            tada              🎉  celebration
            warning           ⚠️  warning
            hourglass_flowing_sand  ⏳  in progress
            thumbsup          👍  approval
        type: string
        required: true
      timeout_minutes:
        description: "Job timeout in minutes"
        type: number
        default: 5
jobs:
  slack-react:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    steps:
      - id: set-env
        shell: bash
        env:
          INPUT_CHANNEL: ${{ inputs.channel_id }}
          INPUT_MESSAGE_TS: ${{ inputs.message_ts }}
          INPUT_EMOJI: ${{ inputs.emoji }}
        run: |
          echo "GHA_SLACK_REACT_CHANNEL=$INPUT_CHANNEL" >> $GITHUB_ENV
          echo "GHA_SLACK_REACT_MESSAGE_TS=$INPUT_MESSAGE_TS" >> $GITHUB_ENV
          echo "GHA_SLACK_REACT_EMOJI=$INPUT_EMOJI" >> $GITHUB_ENV
      - id: slack-react
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: reactions.add
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.GHA_SLACK_REACT_CHANNEL }}",
              "timestamp": "${{ env.GHA_SLACK_REACT_MESSAGE_TS }}",
              "name": "${{ env.GHA_SLACK_REACT_EMOJI }}"
            }
