name: Entur/Slack/CI

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_review:
    types: [submitted]

jobs:
  verify-pr:
    name: Verify PR
    if: ${{ github.event_name == 'pull_request' }}
    uses: entur/gha-meta/.github/workflows/verify-pr.yml@v1

  test-post-message:
    if: github.actor != 'dependabot[bot]' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    uses: ./.github/workflows/post.yml
    with:
      channel_id: "C01AVRY6Q23" # notify-plattform
      message: "gha-slack CI: Test to send simple plain text message\n with line break using gha-slack/post!"
    secrets: inherit

  test-post-message-with-blocks:
    if: github.actor != 'dependabot[bot]' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    uses: ./.github/workflows/post.yml
    with:
      channel_id: "C01AVRY6Q23" # notify-plattform
      message: "GitHub Action build result: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
      blocks: |
        [
        		{
         			"type": "section",
         			"text": {
          				"type": "mrkdwn",
          				"text": "*gha-slack CI: Test to send JSON rich message using Block Kit from gha-slack/post!!* :rocket:"
             	}
            },
            {
         			"type": "divider"
            },
            {
         			"type": "section",
         			"fields": [
        				{
         					"type": "mrkdwn",
         					"text": "*Repository:*\n<https://github.com/entur/gha-slack|gha-slack>"
        				},
        				{
         					"type": "mrkdwn",
         					"text": "*Workflow:*\n<https://github.com/entur/gha-slack/.github/workflows/post.yml|post>"
        				}
         			]
            }
         ]
    secrets: inherit

  test-post-message-threaded-reply:
    needs: test-post-message
    uses: ./.github/workflows/post.yml
    with:
      channel_id: "C01AVRY6Q23" # notify-plattform
      message: "gha-slack CI: Threaded reply to plain text message (testing thread_ts/message_ts output)"
      thread_ts: ${{ needs.test-post-message.outputs.message_ts }}
    secrets: inherit

  test-post-blocks-threaded-reply:
    needs: test-post-message-with-blocks
    uses: ./.github/workflows/post.yml
    with:
      channel_id: "C01AVRY6Q23" # notify-plattform
      message: "gha-slack CI: Threaded reply to blocks message (testing thread_ts/message_ts output)"
      thread_ts: ${{ needs.test-post-message-with-blocks.outputs.message_ts }}
    secrets: inherit

  test-react-to-message:
    needs: test-post-message
    uses: ./.github/workflows/react.yml
    with:
      channel_id: "C01AVRY6Q23" # notify-plattform
      message_ts: ${{ needs.test-post-message.outputs.message_ts }}
      emoji: "white_check_mark"
    secrets: inherit

  test-react-to-blocks:
    needs: test-post-message-with-blocks
    uses: ./.github/workflows/react.yml
    with:
      channel_id: "C01AVRY6Q23" # notify-plattform
      message_ts: ${{ needs.test-post-message-with-blocks.outputs.message_ts }}
      emoji: "rocket"
    secrets: inherit

  update-post-doc:
    needs:
      - test-post-message-threaded-reply
      - test-post-blocks-threaded-reply
      - test-react-to-message
      - test-react-to-blocks
    uses: entur/gha-meta/.github/workflows/auto-doc.yml@v1
    with:
      workflow_file: .github/workflows/post.yml
      readme_file: README-post.md

  update-react-doc:
    needs:
      - test-post-message-threaded-reply
      - test-post-blocks-threaded-reply
      - test-react-to-message
      - test-react-to-blocks
    uses: entur/gha-meta/.github/workflows/auto-doc.yml@v1
    with:
      workflow_file: .github/workflows/react.yml
      readme_file: README-react.md
