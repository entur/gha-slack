name: Entur/Slack/Post

on:
  workflow_call:
    outputs:
      message_ts:
        description: "Slack message timestamp, which serves as the unique message ID. Use as thread_ts to post threaded replies, or with reactions.add/chat.update/chat.delete."
        value: ${{ jobs.slack-post.outputs.message_ts }}
    inputs:
      channel_id:
        description: "Slack channel id you wish to post message to"
        type: string
        required: true
      blocks:
        description: "The Slack blocks to include in the message"
        required: false
        type: string
      message:
        description: "Simple plain text message to post to Slack"
        required: false
        type: string
        default: "Default slack message"
      thread_ts:
        description: "Post as a threaded reply to this message_ts (the unique Slack message ID)"
        required: false
        type: string
      timeout_minutes:
        description: "Job timeout in minutes"
        type: number
        default: 5
jobs:
  slack-post:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    outputs:
      message_ts: ${{ steps.post.outputs.message_ts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: post
        uses: ./.github/actions/post
        with:
          channel_id: ${{ inputs.channel_id }}
          message: ${{ inputs.message }}
          blocks: ${{ inputs.blocks }}
          thread_ts: ${{ inputs.thread_ts }}
          token: ${{ secrets.SLACK_BOT_TOKEN }}
