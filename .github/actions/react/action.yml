name: Entur/Slack/React
description: Add a reaction to a Slack message

inputs:
  channel_id:
    description: "Slack channel ID"
    required: true
  message_ts:
    description: "Message timestamp to react to"
    required: true
  emoji:
    description: "Emoji name without colons"
    required: true
  token:
    description: "Slack bot token"
    required: true

runs:
  using: composite
  steps:
    - id: slack-react
      uses: slackapi/slack-github-action@v3.0.1
      with:
        method: reactions.add
        token: ${{ inputs.token }}
        errors: false
        payload: |
          channel: "${{ inputs.channel_id }}"
          timestamp: "${{ inputs.message_ts }}"
          name: "${{ inputs.emoji }}"
    - id: check-result
      shell: bash
      env:
        OK: ${{ steps.slack-react.outputs.ok }}
        RESPONSE: ${{ steps.slack-react.outputs.response }}
      run: |
        if [ "$OK" = "true" ]; then
          echo "Reaction added."
          exit 0
        fi
        ERROR=$(echo "$RESPONSE" | jq -r '.error // "unknown"')
        if [ "$ERROR" = "already_reacted" ]; then
          echo "::notice::Reaction already present (already_reacted) - ignoring."
          exit 0
        fi
        echo "::error::Slack reactions.add failed: $ERROR"
        exit 1
